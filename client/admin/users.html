<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Entities | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Core Systems</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link active">Entity Management</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">Entity Management</h1>
                <p style="color: var(--text-muted);">Registry of all verified institutional investigators and students.</p>
            </header>

            <div class="glass" style="padding: 1.5rem;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Entity ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Department</th>
                                <th>Flags</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="usersTable">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user || user.role !== 'admin') window.location.href = '../login.html';

            try {
                const users = await api.request('/users');
                const tbody = document.getElementById('usersTable');
                
                users.forEach(u => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-family: monospace; font-size: 0.8rem; color: var(--primary);">USR-${u._id.substring(18).toUpperCase()}</td>
                        <td>${u.name}</td>
                        <td style="color: var(--text-muted); font-size: 0.85rem;">${u.email}</td>
                        <td><span style="background: rgba(255,255,255,0.05); color: var(--text-main); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">${u.role.toUpperCase()}</span></td>
                        <td style="font-size: 0.85rem;">${u.department || 'N/A'}</td>
                        <td><span style="color: ${u.flaggedCount > 0 ? 'var(--danger)' : 'var(--success)'}; font-weight: 700;">${u.flaggedCount}</span></td>
                        <td><span style="color: var(--success); font-size: 0.75rem;">● ACTIVE</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
