<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Terminal | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link active">Core Systems</a></li>
                <li class="nav-item"><a href="users.html" class="nav-link">Entity Management</a></li>
                <li class="nav-item"><a href="reports.html" class="nav-link">Institutional Reports</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">System Command Center</h1>
                <p style="color: var(--text-muted);">Institutional monitoring and entity synchronization active.</p>
            </header>

            <div class="grid-stats">
                <div class="stat-card glass">
                    <p class="stat-label">Total Entities</p>
                    <h2 class="stat-value" id="totalUsers">0</h2>
                </div>
                <div class="stat-card glass">
                    <p class="stat-label">Active Deployments</p>
                    <h2 class="stat-value">142</h2>
                </div>
                <div class="stat-card glass">
                    <p class="stat-label">Critical Breaches</p>
                    <h2 class="stat-value" id="criticalAlerts" style="color: var(--danger);">0</h2>
                </div>
                <div class="stat-card glass">
                    <p class="stat-label">Network Latency</p>
                    <h2 class="stat-value" style="color: var(--accent);">12ms</h2>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">User Distribution</h3>
                    <div style="max-height: 300px; display: flex; justify-content: center;">
                        <canvas id="userChart"></canvas>
                    </div>
                </div>
                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">System Resource Load</h3>
                    <canvas id="loadChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user || user.role !== 'admin') window.location.href = '../login.html';

            try {
                const [users, alerts] = await Promise.all([
                    api.request('/users'),
                    api.alerts.getAll()
                ]);

                document.getElementById('totalUsers').innerText = users.length;
                document.getElementById('criticalAlerts').innerText = alerts.filter(a => a.riskLevel === 'critical').length;

                // User Chart
                const roles = { admin: 0, faculty: 0, student: 0 };
                users.forEach(u => roles[u.role]++);

                new Chart(document.getElementById('userChart'), {
                    type: 'doughnut',
                    data: {
                        labels: ['Admin', 'Faculty', 'Student'],
                        datasets: [{
                            data: [roles.admin, roles.faculty, roles.student],
                            backgroundColor: ['#8b5cf6', '#6366f1', '#0ea5e9'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8' } } }
                    }
                });

                // Load Chart
                new Chart(document.getElementById('loadChart'), {
                    type: 'line',
                    data: {
                        labels: ['00:00', '04:00', '08:00', '12:00', '16:00', '20:00'],
                        datasets: [{
                            label: 'CPU Usage %',
                            data: [12, 15, 45, 82, 65, 30],
                            borderColor: '#0ea5e9',
                            tension: 0.4
                        }]
                    },
                    options: {
                        scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } } }
                    }
                });

            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
