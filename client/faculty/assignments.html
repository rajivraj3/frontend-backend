<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Assignments | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Overview</a></li>
                <li class="nav-item"><a href="assignments.html" class="nav-link active">Assignments</a></li>
                <li class="nav-item"><a href="alerts.html" class="nav-link">Forensic Alerts</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 style="font-size: 1.75rem;">Assignment Repository</h1>
                    <p style="color: var(--text-muted);">Manage forensic analysis targets</p>
                </div>
            </header>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 2rem;">
                <div class="glass" style="padding: 1.5rem; height: fit-content;">
                    <h3 style="margin-bottom: 1.5rem;">Create Analysis Target</h3>
                    <form id="assignmentForm">
                        <div class="form-group">
                            <label class="label">Assignment Title</label>
                            <input type="text" id="title" class="input" placeholder="Final Project Phase 1" required>
                        </div>
                        <div class="form-group">
                            <label class="label">Subject / Unit</label>
                            <input type="text" id="subject" class="input" placeholder="CS-402: Distributed Systems" required>
                        </div>
                        <div class="form-group">
                            <label class="label">Due Date</label>
                            <input type="date" id="dueDate" class="input" required>
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                            Publish Target
                        </button>
                    </form>
                </div>

                <div class="glass" style="padding: 1.5rem;">
                    <h3 style="margin-bottom: 1.5rem;">Active Targets</h3>
                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Subject</th>
                                    <th>Due Date</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="assignmentTable">
                                <!-- Injected -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user || user.role !== 'faculty') window.location.href = '../login.html';

            loadAssignments();

            document.getElementById('assignmentForm').onsubmit = async (e) => {
                e.preventDefault();
                const data = {
                    title: document.getElementById('title').value,
                    subject: document.getElementById('subject').value,
                    dueDate: document.getElementById('dueDate').value
                };

                try {
                    await api.assignments.create(data);
                    alert('Assignment created successfully');
                    loadAssignments();
                    e.target.reset();
                } catch (err) {
                    alert(err.message);
                }
            };
        });

        async function loadAssignments() {
            try {
                const assignments = await api.assignments.getAll();
                const tbody = document.getElementById('assignmentTable');
                tbody.innerHTML = '';
                assignments.forEach(a => {
                    const row = document.createElement('tr');
                    const isOverdue = new Date(a.dueDate) < new Date();
                    row.innerHTML = `
                        <td>${a.title}</td>
                        <td>${a.subject}</td>
                        <td style="color: ${isOverdue ? 'var(--danger)' : 'var(--text-muted)'}; font-size: 0.85rem;">${new Date(a.dueDate).toLocaleDateString()}</td>
                        <td><span style="background: rgba(99, 102, 241, 0.1); color: var(--primary); padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">ACTIVE</span></td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
            }
        }
    </script>
</body>
</html>
