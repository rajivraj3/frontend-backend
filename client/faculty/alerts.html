<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forensic Alerts | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Overview</a></li>
                <li class="nav-item"><a href="assignments.html" class="nav-link">Assignments</a></li>
                <li class="nav-item"><a href="alerts.html" class="nav-link active">Forensic Alerts</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">Forensic Alerts & Flags</h1>
                <p style="color: var(--text-muted);">Reviewing high-probability patterns from the repository.</p>
            </header>

            <div class="glass" style="padding: 1.5rem;">
                <div id="alertsContainer" style="display: flex; flex-direction: column; gap: 1rem;">
                    <!-- Alerts injected here -->
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user || user.role !== 'faculty') window.location.href = '../login.html';

            try {
                const alerts = await api.alerts.getAll();
                const container = document.getElementById('alertsContainer');
                
                if (alerts.length === 0) {
                    container.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 3rem;">No security flags detected in the current cycle.</p>';
                    return;
                }

                alerts.forEach(alert => {
                    const card = document.createElement('div');
                    card.className = 'glass animate-fade';
                    card.style.padding = '1.5rem';
                    card.style.background = 'rgba(255,255,255,0.02)';
                    
                    card.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div style="display: flex; gap: 1.5rem; align-items: center;">
                                <div style="background: ${getRiskColor(alert.riskLevel)}22; color: ${getRiskColor(alert.riskLevel)}; width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem;">
                                    ${getAlertIcon(alert.type)}
                                </div>
                                <div>
                                    <h3 style="font-size: 1.1rem; margin-bottom: 0.25rem;">${alert.type.replace('_', ' ').toUpperCase()}</h3>
                                    <p style="color: var(--text-muted); font-size: 0.9rem;">${alert.message}</p>
                                    <div style="display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.8rem;">
                                        <span>Student: <strong style="color: var(--text-main);">${alert.submissionId.studentId.name}</strong></span>
                                        <span>Assignment: <strong style="color: var(--text-main);">${alert.submissionId.assignmentId.title}</strong></span>
                                        <span>Confidence: <strong style="color: ${getRiskColor(alert.riskLevel)};">${alert.confidence}%</strong></span>
                                    </div>
                                </div>
                            </div>
                            <div style="display: flex; gap: 0.75rem;">
                                ${alert.status === 'pending' ? `
                                    <button onclick="reviewAlert('${alert._id}', 'confirmed')" class="btn btn-primary" style="padding: 0.5rem 1rem; font-size: 0.8rem; background: var(--danger);">Confirm Match</button>
                                    <button onclick="reviewAlert('${alert._id}', 'dismissed')" class="btn glass" style="padding: 0.5rem 1rem; font-size: 0.8rem;">Dismiss</button>
                                ` : `
                                    <span style="color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase;">Status: ${alert.status}</span>
                                `}
                            </div>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (err) {
                console.error(err);
            }
        });

        function getRiskColor(level) {
            switch(level) {
                case 'critical': return '#ef4444';
                case 'high': return '#f97316';
                case 'medium': return '#f59e0b';
                default: return '#10b981';
            }
        }

        function getAlertIcon(type) {
            switch(type) {
                case 'duplicate_file': return '📑';
                case 'content_similarity': return '🔍';
                case 'timing_anomaly': return '⏱️';
                case 'ip_collision': return '🌐';
                case 'repeat_offender': return '⚠️';
                default: return '🔔';
            }
        }

        async function reviewAlert(id, status) {
            try {
                await api.alerts.review(id, status);
                location.reload();
            } catch (err) {
                alert(err.message);
            }
        }
    </script>
</body>
</html>
