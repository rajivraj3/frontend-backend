<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veritas | Forensic Integrity</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b, #050914);
            text-align: center;
            padding: 2rem;
        }
        .hero h1 {
            font-size: 4rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #fff, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 3rem;
        }
    </style>
</head>
<body>
    <nav class="mobile-nav">
        <div class="logo" style="margin-bottom: 0;">
            <div class="logo-icon">V</div>
            <span>Veritas</span>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <div class="hero animate-fade">
        <div class="logo-icon" style="width: 64px; height: 64px; margin: 0 auto 2rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <h1>VERITAS</h1>
        <p>Advanced Forensic Analysis for Academic Integrity. Pattern recognition, similarity detection, and anomaly tracking.</p>
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <button class="btn btn-primary" onclick="location.href='login.html'">Access Terminal</button>
            <button class="btn glass" onclick="location.href='register.html'">Enroll Institution</button>
        </div>
    </div>
</body>
</html>
