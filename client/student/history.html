<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submission History | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li class="nav-item"><a href="submit.html" class="nav-link">Submit</a></li>
                <li class="nav-item"><a href="history.html" class="nav-link active">History</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">Submission Archive</h1>
                <p style="color: var(--text-muted);">Historical record of all institutional evidence submissions.</p>
            </header>

            <div class="glass" style="padding: 1.5rem;">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Ref ID</th>
                                <th>Assignment</th>
                                <th>File Name</th>
                                <th>Submission Date</th>
                                <th>Status</th>
                                <th>Hash (SHA256)</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user) window.location.href = '../login.html';

            try {
                const submissions = await api.submissions.getAll();
                const tbody = document.getElementById('historyTable');
                
                if (submissions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align: center; padding: 3rem; color: var(--text-muted);">No submission records found.</td></tr>';
                    return;
                }

                submissions.forEach(sub => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td style="font-family: monospace; font-size: 0.8rem; color: var(--primary);">SUB-${sub._id.substring(18).toUpperCase()}</td>
                        <td>${sub.assignmentId.title}</td>
                        <td style="color: var(--text-muted); font-size: 0.85rem;">${sub.fileName}</td>
                        <td style="font-size: 0.8rem;">${new Date(sub.submittedAt).toLocaleString()}</td>
                        <td><span style="background: ${getStatusColor(sub.status)}22; color: ${getStatusColor(sub.status)}; padding: 0.25rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: 700;">${sub.status.toUpperCase()}</span></td>
                        <td style="font-family: monospace; font-size: 0.7rem; color: var(--text-muted);">${sub.hash.substring(0, 16)}...</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
            }
        });

        function getStatusColor(status) {
            switch(status) {
                case 'flagged': return '#ef4444';
                case 'reviewed': return '#f59e0b';
                case 'clean': return '#10b981';
                default: return '#94a3b8';
            }
        }
    </script>
</body>
</html>
