<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link active">Dashboard</a></li>
                <li class="nav-item"><a href="submit.html" class="nav-link">Submit</a></li>
                <li class="nav-item"><a href="history.html" class="nav-link">History</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">Student Portal</h1>
                <p style="color: var(--text-muted);">Welcome back, <span id="userName">User</span></p>
            </header>

            <div class="grid-stats">
                <div class="stat-card glass">
                    <p class="stat-label">Total Submissions</p>
                    <h2 class="stat-value" id="subCount">0</h2>
                </div>
                <div class="stat-card glass">
                    <p class="stat-label">Active Assignments</p>
                    <h2 class="stat-value" id="activeAss">0</h2>
                </div>
                <div class="stat-card glass">
                    <p class="stat-label">Integrity Flags</p>
                    <h2 class="stat-value" id="flags" style="color: var(--success);">0</h2>
                </div>
            </div>

            <div class="glass" style="padding: 1.5rem;">
                <h3 style="margin-bottom: 1.5rem;">Submission History</h3>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Assignment</th>
                                <th>File Name</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Integrity</th>
                            </tr>
                        </thead>
                        <tbody id="historyTable">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user) window.location.href = '../login.html';
            document.getElementById('userName').innerText = user.name;

            try {
                const [submissions, assignments] = await Promise.all([
                    api.submissions.getAll(),
                    api.assignments.getAll()
                ]);

                document.getElementById('subCount').innerText = submissions.length;
                document.getElementById('activeAss').innerText = assignments.length;
                
                const flagged = submissions.filter(s => s.status === 'flagged').length;
                document.getElementById('flags').innerText = flagged;
                document.getElementById('flags').style.color = flagged > 0 ? 'var(--danger)' : 'var(--success)';

                const tbody = document.getElementById('historyTable');
                submissions.forEach(sub => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${sub.assignmentId.title}</td>
                        <td style="font-size: 0.85rem; color: var(--text-muted);">${sub.fileName}</td>
                        <td style="font-size: 0.8rem;">${new Date(sub.submittedAt).toLocaleDateString()}</td>
                        <td><span style="background: ${sub.status === 'flagged' ? 'var(--danger)22' : 'var(--success)22'}; color: ${sub.status === 'flagged' ? 'var(--danger)' : 'var(--success)'}; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">${sub.status.toUpperCase()}</span></td>
                        <td>
                            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px;">
                                <div style="width: ${100 - sub.suspiciousScore}%; height: 100%; background: var(--primary); border-radius: 2px;"></div>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
