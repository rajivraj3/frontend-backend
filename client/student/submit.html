<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Assignment | Veritas Forensics</title>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <nav class="mobile-nav">
        <div class="logo" style="margin-bottom: 0;">
            <div class="logo-icon">V</div>
            <span>Veritas</span>
        </div>
        <button class="menu-toggle" id="menuToggle">☰</button>
    </nav>

    <div class="app-container">
        <aside class="sidebar">
            <a href="#" class="logo">
                <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                VERITAS
            </a>
            <ul class="nav-links">
                <li class="nav-item"><a href="dashboard.html" class="nav-link">Dashboard</a></li>
                <li class="nav-item"><a href="submit.html" class="nav-link active">Submit</a></li>
                <li class="nav-item"><a href="history.html" class="nav-link">History</a></li>
            </ul>
            <div style="margin-top: auto;">
                <a href="#" onclick="api.auth.logout()" class="nav-link">Logout</a>
            </div>
        </aside>

        <main class="main-content">
            <header style="margin-bottom: 2rem;">
                <h1 style="font-size: 1.75rem;">New Evidence Submission</h1>
                <p style="color: var(--text-muted);">Ensure all documents comply with institutional integrity standards.</p>
            </header>

            <div class="glass" style="max-width: 600px; padding: 2rem;">
                <form id="uploadForm">
                    <div class="form-group">
                        <label class="label">Select Assignment</label>
                        <select id="assignmentId" class="input" style="background: rgba(16, 20, 32, 1);" required>
                            <option value="">Loading assignments...</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="label">Upload Document (PDF, DOCX, TXT)</label>
                        <div id="dropZone" style="border: 2px dashed var(--glass-border); border-radius: 12px; padding: 3rem; text-align: center; cursor: pointer; transition: var(--transition);">
                            <div style="color: var(--primary); margin-bottom: 1rem;">
                                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                            </div>
                            <p>Drag & drop or click to browse</p>
                            <input type="file" id="fileInput" style="display: none;" accept=".pdf,.docx,.txt">
                        </div>
                        <p id="fileName" style="margin-top: 1rem; color: var(--primary); font-weight: 600;"></p>
                    </div>

                    <div id="uploadStatus" style="display: none; margin-bottom: 1.5rem; padding: 1rem; border-radius: 8px; font-size: 0.875rem;"></div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        Initialize Secure Upload
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.auth.getUser();
            if (!user || user.role !== 'student') window.location.href = '../login.html';

            // Load assignments
            try {
                const assignments = await api.assignments.getAll();
                const select = document.getElementById('assignmentId');
                select.innerHTML = '<option value="">Choose assignment...</option>';
                assignments.forEach(a => {
                    select.innerHTML += `<option value="${a._id}">${a.title} - ${a.subject}</option>`;
                });
            } catch (err) {
                console.error(err);
            }

            // File selection
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileName = document.getElementById('fileName');

            dropZone.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                if (e.target.files.length) {
                    fileName.innerText = `Selected: ${e.target.files[0].name}`;
                    dropZone.style.borderColor = 'var(--primary)';
                }
            };

            // Form submission
            document.getElementById('uploadForm').onsubmit = async (e) => {
                e.preventDefault();
                const statusDiv = document.getElementById('uploadStatus');
                const file = fileInput.files[0];
                const assignmentId = document.getElementById('assignmentId').value;

                if (!file || !assignmentId) return alert('Please fill all fields');

                statusDiv.style.display = 'block';
                statusDiv.style.background = 'rgba(99, 102, 241, 0.1)';
                statusDiv.style.color = 'var(--primary)';
                statusDiv.innerText = 'Encrypting and uploading...';

                const formData = new FormData();
                formData.append('assignment', file);
                formData.append('assignmentId', assignmentId);

                try {
                    const result = await api.submissions.upload(formData);
                    if (result.error) throw new Error(result.error);

                    statusDiv.style.background = 'rgba(16, 185, 129, 0.1)';
                    statusDiv.style.color = 'var(--success)';
                    statusDiv.innerText = '✅ Submission verified and stored successfully.';
                    
                    setTimeout(() => window.location.href = 'history.html', 2000);
                } catch (err) {
                    statusDiv.style.background = 'rgba(239, 68, 68, 0.1)';
                    statusDiv.style.color = 'var(--danger)';
                    statusDiv.innerText = `❌ Error: ${err.message}`;
                }
            };
        });
    </script>
</body>
</html>
