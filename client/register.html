<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enrollment | Veritas Forensics</title>
    <link rel="stylesheet" href="css/index.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at bottom left, #1e1b4b, #050914);
            padding: 2rem;
        }
        .register-card {
            width: 100%;
            max-width: 500px;
            padding: 3rem 2.5rem;
        }
        .register-header {
            margin-bottom: 2.5rem;
            text-align: center;
        }
        .register-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="register-card glass animate-fade">
        <div class="register-header">
            <div class="logo-icon" style="margin: 0 auto 1.5rem;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="17" y1="11" x2="23" y2="11"/></svg>
            </div>
            <h1>New Enrollment</h1>
            <p>Access the forensic archives by creating your profile</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label class="label">Full Legal Name</label>
                <input type="text" id="name" class="input" placeholder="Dr. Julian Vane" required>
            </div>
            <div class="form-group">
                <label class="label">Institutional Email</label>
                <input type="email" id="email" class="input" placeholder="vane@oxford.edu" required>
            </div>
            <div class="grid-stats" style="grid-template-columns: 1fr 1fr; margin-bottom: 0;">
                <div class="form-group">
                    <label class="label">Role</label>
                    <select id="role" class="input" style="background: rgba(16, 20, 32, 1);">
                        <option value="student">Student</option>
                        <option value="faculty">Faculty</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="label">Department</label>
                    <input type="text" id="department" class="input" placeholder="Computer Science">
                </div>
            </div>
            <div class="form-group">
                <label class="label">Access Key (Password)</label>
                <input type="password" id="password" class="input" placeholder="••••••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">
                Finalize Enrollment
            </button>
        </form>

        <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.875rem;">
            Already verified? <a href="login.html" style="color: var(--primary); text-decoration: none;">Secure Login</a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const userData = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                role: document.getElementById('role').value,
                department: document.getElementById('department').value,
                password: document.getElementById('password').value
            };

            try {
                await api.auth.register(userData);
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
